name: Reporte MLB

on:
  schedule:
    - cron: '0 15-23,0-3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Cache de datos
        uses: actions/cache@v4
        with:
          path: data
          key: mlb-data-${{ github.run_id }}
          restore-keys: mlb-data-

      - name: Crear DB
        run: python db.py

      - name: Actualizar stats
        run: |
          if [ ! -f data/mlb.db ] || [ ! -s data/mlb.db ]; then
            python ingest.py
          else
            COUNT=$(python -c "from db import get_conn; print(get_conn().execute('SELECT COUNT(*) FROM batter_stats').fetchone()[0])" 2>/dev/null || echo 0)
            if [ "$COUNT" -lt 100 ]; then
              python ingest.py
            else
              echo "Stats ya cargadas ($COUNT filas)"
            fi
          fi

      - name: Generar reporte
        run: python reporte.py

      - name: Publicar
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "Reporte $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
